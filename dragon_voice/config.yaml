server:
  host: "0.0.0.0"
  port: 3502

stt:
  backend: "moonshine"  # moonshine, whisper_cpp, vosk
  model: "medium"
  language: "en"
  # moonshine-specific
  moonshine_model_path: ""
  # whisper_cpp-specific
  whisper_model_path: ""
  # vosk-specific
  vosk_model_path: ""

tts:
  backend: "piper"  # piper, kokoro, edge_tts
  # piper-specific
  piper_model: "en_US-lessac-medium"
  piper_data_dir: ""
  # kokoro-specific
  kokoro_model_path: ""
  kokoro_voice: "af_heart"
  # edge_tts-specific
  edge_voice: "en-US-AriaNeural"

  sample_rate: 22050

llm:
  local_backend: "ollama"  # Stores original local backend for cloud-to-local fallback
  backend: "ollama"  # ollama, openrouter, lmstudio, npu_genie
  # ollama
  ollama_url: "http://localhost:11434"
  ollama_model: "qwen3:1.7b"
  # openrouter
  openrouter_api_key: ""  # reads from OPENROUTER_API_KEY env var if empty
  openrouter_model: "anthropic/claude-3.5-haiku"
  openrouter_url: "https://openrouter.ai/api/v1"
  # lmstudio
  lmstudio_url: "http://localhost:1234/v1"
  lmstudio_model: "default"

  system_prompt: "You are Tinker, a helpful AI assistant. Reply in 1-2 sentences maximum. Be concise. Never simulate user responses. Never generate text after your answer. Stop immediately after answering."
  max_tokens: 256
  temperature: 0.7

audio:
  input_sample_rate: 16000
  input_channels: 1
  output_sample_rate: 22050
  vad_enabled: true
  vad_silence_ms: 600

# Tools configuration
tools:
  enabled: true
  max_tool_calls: 3
  web_search_engine: "duckduckgo"
  searxng_url: ""  # Set to http://localhost:8888 to use SearXNG
